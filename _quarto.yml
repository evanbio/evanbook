project:
  type: website

website:
  title: "Evanbook"
  description: "A book companion for the evanverse R package."

  sidebar:
    style: "docked"
    search: true
    tools:
      - icon: github
        href: https://github.com/evanbio/evanverse
        aria-label: GitHub
      - icon: box-arrow-up-right
        href: https://evanbio.github.io/evanverse/
        aria-label: Package site
    contents:
      - index.qmd
      - section: "Modules"
        contents:
          - modules/base.qmd
          - modules/ops.qmd
          - modules/pkg.qmd
          - modules/download.qmd
          - modules/stat.qmd
          - modules/plot.qmd
          - modules/toy.qmd

  page-footer:
    left: "© 2026 Yibin Zhou"
    right: "Licensed under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/)"

format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    fontsize: 20px
    mainfont: "Source Serif 4"
    monofont: "JetBrains Mono"
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "On this page"
    code-copy: true
    code-overflow: wrap
